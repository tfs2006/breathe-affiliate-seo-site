  <text x="56" y="432" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#d69e2e">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="254" y="432" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.68)">Amazon Verified Reviews</text>

  <!-- === CATEGORY BADGES === -->
  <!-- Badge 1: 7 Supplements -->
  <rect x="56" y="458" width="188" height="36" rx="18" fill="rgba(56,161,105,0.22)" stroke="rgba(56,161,105,0.6)" stroke-width="1.5"/>
  <text x="150" y="481" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#9ae6b4" text-anchor="middle">&#10003; 7 Supplements</text>
  <!-- Badge 2: 2 Programs -->
  <rect x="256" y="458" width="218" height="36" rx="18" fill="rgba(102,126,234,0.22)" stroke="rgba(102,126,234,0.6)" stroke-width="1.5"/>
  <text x="365" y="481" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#b794f4" text-anchor="middle">&#10003; 2 Breathing Programs</text>
  <!-- Badge 3: Mullein Drops -->
  <rect x="486" y="458" width="178" height="36" rx="18" fill="rgba(66,153,225,0.22)" stroke="rgba(66,153,225,0.6)" stroke-width="1.5"/>
  <text x="575" y="481" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#bee3f8" text-anchor="middle">&#10003; Mullein Drops</text>
  <!-- Badge 4: Free Access -->
  <rect x="676" y="458" width="150" height="36" rx="18" fill="rgba(237,137,54,0.22)" stroke="rgba(237,137,54,0.6)" stroke-width="1.5"/>
  <text x="751" y="481" font-family="Arial, Helvetica, sans-serif" font-size="13.5" font-weight="700" fill="#fbd38d" text-anchor="middle">Free Access</text>

  <!-- === FOOTER BAR === -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.42)"/>
  <!-- Footer lung icon -->
  <rect x="54" y="594" width="2.5" height="7" rx="1.25" fill="rgba(255,255,255,0.55)"/>
  <path d="M54.5 600 C52 598.5 48.5 600.5 48 604 C47.5 607.5 49.5 612 52.5 612.5 L54.5 612.5 Z" fill="rgba(255,255,255,0.55)"/>
  <path d="M55.5 600 C58 598.5 61.5 600.5 62 604 C62.5 607.5 60.5 612 57.5 612.5 L55.5 612.5 Z" fill="rgba(255,255,255,0.55)"/>
  <text x="72" y="611" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">breathe.4ourmedia.com</text>
  <text x="1150" y="611" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="end">Updated March 2026</text>
