<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Main background gradient: dark navy to purple -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="60%" stop-color="#243b6e"/>
      <stop offset="100%" stop-color="#553c9a"/>
    </linearGradient>
    <!-- Left-side text legibility overlay: fades from opaque (left) to transparent (right) -->
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a365d" stop-opacity="1"/>
      <stop offset="55%" stop-color="#1a365d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a365d" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow for right side lung area -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4299e1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4299e1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow rings (right side) -->
  <circle cx="950" cy="310" r="300" fill="url(#glow)"/>
  <circle cx="950" cy="310" r="220" fill="none" stroke="rgba(66,153,225,0.12)" stroke-width="1.5"/>
  <circle cx="950" cy="310" r="140" fill="none" stroke="rgba(66,153,225,0.09)" stroke-width="1"/>

  <!-- === LARGE WATERMARK LUNG (right side, very low opacity) === -->
  <g opacity="0.09" fill="white">
    <!-- Trachea -->
    <rect x="938" y="130" width="24" height="65" rx="12"/>
    <!-- Left lobe -->
    <path d="M940 187 C870 177 780 225 768 300 C756 376 796 478 836 490 L940 490 Z"/>
    <!-- Right lobe -->
    <path d="M960 187 C1030 177 1120 225 1132 300 C1144 376 1104 478 1064 490 L960 490 Z"/>
  </g>

  <!-- Thin inner lung outline for extra depth -->
  <g opacity="0.05" fill="none" stroke="white" stroke-width="3">
    <path d="M940 187 C870 177 780 225 768 300 C756 376 796 478 836 490"/>
    <path d="M960 187 C1030 177 1120 225 1132 300 C1144 376 1104 478 1064 490"/>
  </g>

  <!-- Fade overlay: makes left content area dark and readable -->
  <rect width="760" height="630" fill="url(#fade)"/>

  <!-- === TOP BRAND BADGE === -->
  <rect x="56" y="46" width="242" height="40" rx="20" fill="rgba(66,153,225,0.18)" stroke="rgba(66,153,225,0.5)" stroke-width="1.5"/>
  <!-- Tiny lung icon inside badge -->
  <rect x="74" y="58" width="3" height="8" rx="1.5" fill="#90cdf4"/>
  <path d="M74.5 65 C72 63.5 68 65.5 67.5 69 C67 72.5 69.5 77 72 77.5 L74.5 77.5 Z" fill="#90cdf4" opacity="0.9"/>
  <path d="M75.5 65 C78 63.5 82 65.5 82.5 69 C83 72.5 80.5 77 78 77.5 L75.5 77.5 Z" fill="#90cdf4" opacity="0.9"/>
  <text x="96" y="72" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#90cdf4" letter-spacing="1.8">BREATHE WELLNESS</text>

  <!-- === MAIN HEADLINE === -->
  <text x="56" y="166" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800" fill="white">7 Best Respiratory</text>
  <text x="56" y="240" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800" fill="white">Health Supplements</text>
  <text x="56" y="314" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="800" fill="#90cdf4">of 2026</text>

  <!-- Horizontal rule -->
  <line x1="56" y1="342" x2="580" y2="342" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- === SUBHEADLINE === -->
  <text x="56" y="376" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="rgba(255,255,255,0.78)">Expert Reviews &#183; Honest Rankings &#183; 9 Products Compared</text>

